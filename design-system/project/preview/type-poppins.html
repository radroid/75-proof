<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0}
  .card{ width:700px; height:260px; padding:24px 28px; box-sizing:border-box; background:var(--bg); border:1px solid var(--earned-cream-dark); display:flex; flex-direction:column; justify-content:center; gap:6px }
  .label{ font-family:var(--font-sans); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--fg-muted); font-weight:600 }
  .name{ font-family:var(--font-sans); font-weight:700; font-size:42px; color:var(--fg); line-height:1.05 }
  .specimen{ font-family:var(--font-sans); font-size:16px; color:var(--fg); line-height:1.5; max-width:620px }
  .weights{ display:flex; gap:18px; margin-top:8px; align-items:baseline }
  .weights span{ font-family:var(--font-sans); font-size:18px; color:var(--fg) }
</style></head>
<body>
<div class="card">
  <div class="label">Primary face</div>
  <div class="name">Poppins</div>
  <div class="specimen">Geometric, modern, friendly — used for every structural moment in the product. Dates, numbers, navigation, dense reading. Weights 300 → 700.</div>
  <div class="weights">
    <span style="font-weight:300">Light 300</span>
    <span style="font-weight:400">Regular 400</span>
    <span style="font-weight:500">Medium 500</span>
    <span style="font-weight:600">Semibold 600</span>
    <span style="font-weight:700">Bold 700</span>
  </div>
</div>
</body></html>
