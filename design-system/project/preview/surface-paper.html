<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0}
  .card{ width:700px; height:240px; padding:0; box-sizing:border-box; border:1px solid var(--earned-cream-dark); overflow:hidden; position:relative }
  .paper{ width:100%; height:100%;
    background-color: var(--earned-cream);
    background-image: repeating-linear-gradient(
      to bottom,
      transparent 0,
      transparent 31px,
      var(--earned-rule-line) 31px,
      var(--earned-rule-line) 32px
    );
  }
  .paper::before{ content:""; position:absolute; top:0; bottom:0; left:60px; width:1px; background:var(--earned-margin-line) }
  .label{ position:absolute; top:18px; left:80px; font-family:var(--font-sans); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--fg-muted); font-weight:600 }
  .hand{ position:absolute; top:46px; left:80px; font-family:var(--font-hand); font-size:42px; color:var(--fg) }
  .sub{ position:absolute; top:108px; left:80px; font-family:var(--font-hand); font-weight:500; font-size:24px; color:var(--fg-2); max-width:560px }
  .doodle{ position:absolute; right:24px; bottom:20px; width:90px; height:90px; opacity:.85 }
</style></head>
<body>
<div class="card">
  <div class="paper"></div>
  <div class="label">Surface · ruled paper</div>
  <div class="hand">Wednesday, May 13</div>
  <div class="sub">32px rule line · 1px ink · red margin · slight cream grain.</div>
  <img class="doodle" src="../assets/star.svg" alt="Earned star doodle">
</div>
</body></html>
