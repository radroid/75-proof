<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0}
  .card{ width:700px; height:260px; padding:24px 28px; box-sizing:border-box; background:var(--bg); border:1px solid var(--earned-cream-dark); display:flex; flex-direction:column; justify-content:center; gap:4px; position:relative }
  .label{ font-family:var(--font-sans); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--fg-muted); font-weight:600 }
  .name{ font-family:var(--font-hand); font-weight:700; font-size:64px; color:var(--fg); line-height:1 }
  .specimen{ font-family:var(--font-hand); font-weight:500; font-size:26px; color:var(--fg); line-height:1.25; max-width:620px }
  .small{ font-family:var(--font-sans); font-size:13px; color:var(--fg-muted); margin-top:6px }
</style></head>
<body>
<div class="card">
  <div class="label">Secondary face · handwritten</div>
  <div class="name">Caveat</div>
  <div class="specimen">Today I sat with the book for twenty minutes. Day 12 — three stars earned this week.</div>
  <div class="small">Used for: page titles, habit names, big numbers, annotations. Kalam &amp; Patrick Hand wired as tweaks.</div>
</div>
</body></html>
