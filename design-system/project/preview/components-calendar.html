<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0}
  .card{ width:700px; height:240px; padding:24px 28px; box-sizing:border-box; background:var(--bg); border:1px solid var(--earned-cream-dark) }
  .label{ font-family:var(--font-sans); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--fg-muted); font-weight:600; margin-bottom:16px }
  .grid{ display:grid; grid-template-columns: repeat(7, 1fr); gap:10px 10px }
  .day{ aspect-ratio:1; display:flex; align-items:center; justify-content:center;
    font-family:var(--font-sans); font-weight:600; font-size:13px;
    border:1.5px solid var(--earned-ink); background:var(--earned-cream-light) }
  .day.earned{ background:var(--earned-star-gold) }
  .day.missed{ background:var(--earned-cream); color:var(--earned-rose); border-color:var(--earned-rose) }
  .day.rest{ background:var(--bg); color:var(--earned-sage); border-color:var(--earned-sage); border-style:dashed }
  .day.today{ background:var(--earned-sky); color:var(--earned-cream-light); box-shadow: var(--shadow-ink) }
  .dow{ font-family:var(--font-sans); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--fg-muted); font-weight:600; text-align:center }
</style></head>
<body>
<div class="card">
  <div class="label">Calendar grid · one row from a 75-day challenge</div>
  <div class="grid" style="margin-bottom:8px">
    <div class="dow">M</div><div class="dow">T</div><div class="dow">W</div><div class="dow">T</div><div class="dow">F</div><div class="dow">S</div><div class="dow">S</div>
  </div>
  <div class="grid">
    <div class="day earned">★</div>
    <div class="day earned">★</div>
    <div class="day missed">·</div>
    <div class="day earned">★</div>
    <div class="day earned">★</div>
    <div class="day rest">z</div>
    <div class="day today">13</div>
  </div>
</div>
</body></html>
