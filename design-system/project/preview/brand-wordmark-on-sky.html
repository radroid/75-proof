<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0}
  .card{ width:700px; height:220px; padding:0; box-sizing:border-box; background:var(--earned-sky); border:1px solid var(--earned-cream-dark); display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden}
  .wm{ max-width:62%; max-height:78% }
  .corner{ position:absolute; font-family:var(--font-sans); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:rgba(255,255,255,.7); font-weight:600 }
  .tl{ top:18px; left:24px }
  .br{ bottom:18px; right:24px }
</style></head>
<body>
<div class="card">
  <span class="corner tl">Wordmark · on sky</span>
  <img class="wm" src="../assets/logo-wordmark.png" alt="Earned wordmark on sky blue">
  <span class="corner br">Use 24px clear space minimum</span>
</div>
</body></html>
