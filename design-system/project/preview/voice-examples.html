<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0}
  .card{ width:700px; height:260px; padding:24px 28px; box-sizing:border-box; background:var(--bg); border:1px solid var(--earned-cream-dark) }
  .label{ font-family:var(--font-sans); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--fg-muted); font-weight:600; margin-bottom:14px }
  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px 26px }
  .item{ display:flex; flex-direction:column; gap:4px; padding:8px 12px; border-left:2px solid var(--earned-sky) }
  .item.x{ border-left-color:var(--earned-rose); opacity:.7 }
  .head{ font-family:var(--font-sans); font-size:10px; letter-spacing:.08em; text-transform:uppercase; font-weight:700; color:var(--earned-sky) }
  .item.x .head{ color:var(--earned-rose) }
  .quote{ font-family:var(--font-hand); font-weight:500; font-size:22px; line-height:1.2; color:var(--fg) }
  .item.x .quote{ text-decoration:line-through; text-decoration-thickness:1px }
</style></head>
<body>
<div class="card">
  <div class="label">Voice — write like the user's own notebook</div>
  <div class="grid">
    <div class="item"><div class="head">Yes</div><div class="quote">Today I showed up.</div></div>
    <div class="item x"><div class="head">No</div><div class="quote">Task completed!</div></div>
    <div class="item"><div class="head">Yes</div><div class="quote">Yesterday slipped by. Today's a fresh page.</div></div>
    <div class="item x"><div class="head">No</div><div class="quote">You failed your streak.</div></div>
    <div class="item"><div class="head">Yes</div><div class="quote">What am I trying to build?</div></div>
    <div class="item x"><div class="head">No</div><div class="quote">Add a new goal</div></div>
  </div>
</div>
</body></html>
