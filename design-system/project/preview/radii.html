<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0}
  .card{ width:700px; height:200px; padding:24px 28px; box-sizing:border-box; background:var(--bg); border:1px solid var(--earned-cream-dark) }
  .label{ font-family:var(--font-sans); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--fg-muted); font-weight:600; margin-bottom:18px }
  .row{ display:flex; gap:36px; align-items:center }
  .step{ display:flex; flex-direction:column; align-items:center; gap:10px }
  .shape{ width:80px; height:60px; background:var(--earned-cream-light); border:1.5px solid var(--earned-ink) }
  .name{ font-family:var(--font-sans); font-size:11px; font-weight:600 }
  .val{ font-family:var(--font-mono); font-size:10px; color:var(--fg-muted) }
</style></head>
<body>
<div class="card">
  <div class="label">Radii · paper barely rounds</div>
  <div class="row">
    <div class="step"><div class="shape" style="border-radius:0"></div><div class="name">r-0</div><div class="val">0</div></div>
    <div class="step"><div class="shape" style="border-radius:2px"></div><div class="name">r-1</div><div class="val">2</div></div>
    <div class="step"><div class="shape" style="border-radius:6px"></div><div class="name">r-2</div><div class="val">6</div></div>
    <div class="step"><div class="shape" style="border-radius:10px"></div><div class="name">r-3</div><div class="val">10</div></div>
    <div class="step"><div class="shape" style="border-radius:14px"></div><div class="name">r-4</div><div class="val">14</div></div>
    <div class="step"><div class="shape" style="border-radius:999px"></div><div class="name">pill</div><div class="val">999</div></div>
  </div>
</div>
</body></html>
