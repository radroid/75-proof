<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0}
  .card{ width:700px; height:200px; padding:24px 28px; box-sizing:border-box; background:var(--bg); border:1px solid var(--earned-cream-dark) }
  .label{ font-family:var(--font-sans); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--fg-muted); font-weight:600; margin-bottom:18px }
  .row{ display:flex; gap:24px; align-items:center; flex-wrap:wrap }
  .icon{ display:flex; flex-direction:column; align-items:center; gap:8px }
  .icon svg{ display:block; overflow:visible }
  .name{ font-family:var(--font-sans); font-size:10px; letter-spacing:.04em; color:var(--fg-muted); font-weight:600 }
  /* Shared SVG hand-drawn filter — applies turbulence + slight displacement */
  .ink{ stroke:#1F1F1D; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; fill:none }
</style></head>
<body>
<div class="card">
  <div class="label">Icons · hand-drawn, wobbly stroke</div>
  <!-- Shared filter for organic stroke jitter -->
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <filter id="rough" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" seed="3" result="t"/>
        <feDisplacementMap in="SourceGraphic" in2="t" scale="1.6"/>
      </filter>
      <filter id="rough2" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence type="fractalNoise" baseFrequency="0.06" numOctaves="2" seed="11" result="t"/>
        <feDisplacementMap in="SourceGraphic" in2="t" scale="1.4"/>
      </filter>
      <filter id="rough3" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" seed="7" result="t"/>
        <feDisplacementMap in="SourceGraphic" in2="t" scale="1.5"/>
      </filter>
    </defs>
  </svg>
  <div class="row">

    <!-- Book — open, two pages, slight tilt -->
    <div class="icon">
      <svg width="36" height="36" viewBox="0 0 36 36" filter="url(#rough)" style="transform:rotate(-3deg)">
        <path class="ink" d="M4 9 C 9 7, 14 7, 17 9 L17 30 C 14 28, 9 28, 4 30 Z"/>
        <path class="ink" d="M17 9 C 20 7, 25 7, 30 9 L30 30 C 25 28, 20 28, 17 30 Z"/>
        <path class="ink" d="M7 14 L13 14"/>
        <path class="ink" d="M7 18 L13 18"/>
        <path class="ink" d="M21 14 L27 14"/>
        <path class="ink" d="M21 18 L27 18"/>
      </svg>
      <div class="name">Book</div>
    </div>

    <!-- Calendar — paper with binder rings -->
    <div class="icon">
      <svg width="36" height="36" viewBox="0 0 36 36" filter="url(#rough2)" style="transform:rotate(2deg)">
        <path class="ink" d="M5 11 C 5 10, 6 9, 7 9 L29 9 C 30 9, 31 10, 31 11 L31 28 C 31 29, 30 30, 29 30 L7 30 C 6 30, 5 29, 5 28 Z"/>
        <path class="ink" d="M5 15 L31 15"/>
        <path class="ink" d="M11 5 L11 11"/>
        <path class="ink" d="M25 5 L25 11"/>
        <path class="ink" d="M13 21 L15 23"/>
        <path class="ink" d="M19 21 L21 23"/>
      </svg>
      <div class="name">Calendar</div>
    </div>

    <!-- Clock — imperfect circle that doesn't quite close -->
    <div class="icon">
      <svg width="36" height="36" viewBox="0 0 36 36" filter="url(#rough3)" style="transform:rotate(-2deg)">
        <path class="ink" d="M18 5 C 26 5, 31 11, 31 18 C 31 25, 26 31, 18 31 C 10 31, 5 25, 5 18 C 5 11, 10 5.2, 17 5"/>
        <path class="ink" d="M18 11 L18 18 L23 21"/>
      </svg>
      <div class="name">Time</div>
    </div>

    <!-- Pencil — diagonal, with bit of overshoot -->
    <div class="icon">
      <svg width="36" height="36" viewBox="0 0 36 36" filter="url(#rough)" style="transform:rotate(4deg)">
        <path class="ink" d="M22 5 L30 13 L14 29 L6 30 L7 22 Z"/>
        <path class="ink" d="M20 7 L28 15"/>
        <path class="ink" d="M9 24 L12 27"/>
      </svg>
      <div class="name">Edit</div>
    </div>

    <!-- Add — plus with overshoot -->
    <div class="icon">
      <svg width="36" height="36" viewBox="0 0 36 36" filter="url(#rough2)" style="transform:rotate(-4deg)">
        <path class="ink" d="M18 5 L18 31"/>
        <path class="ink" d="M5 18 L31 18"/>
      </svg>
      <div class="name">Add</div>
    </div>

    <!-- Chevron down — gentle wobble -->
    <div class="icon">
      <svg width="36" height="36" viewBox="0 0 36 36" filter="url(#rough3)" style="transform:rotate(3deg)">
        <path class="ink" d="M7 13 L18 24 L29 13"/>
      </svg>
      <div class="name">More</div>
    </div>

    <!-- Heart — slightly imperfect -->
    <div class="icon">
      <svg width="36" height="36" viewBox="0 0 36 36" filter="url(#rough)" style="transform:rotate(-3deg)">
        <path class="ink" d="M18 30 C 6 22, 4 12, 11 9 C 15 8, 18 11, 18 14 C 18 11, 21 8, 25 9 C 32 12, 30 22, 18 30 Z"/>
      </svg>
      <div class="name">Save</div>
    </div>

    <!-- Brand star — the namesake -->
    <div class="icon">
      <svg width="36" height="36" viewBox="0 0 100 100" style="transform:rotate(-8deg)">
        <path d="M50 8 L61 38 L93 39 L67 58 L77 90 L50 72 L23 90 L33 58 L7 39 L39 38 Z" fill="#D8A830" stroke="#1F1F1D" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
        <path d="M28 26 Q34 22 40 27" fill="none" stroke="#FFF8E1" stroke-width="3.2" stroke-linecap="round" opacity="0.95"/>
      </svg>
      <div class="name">Star</div>
    </div>

  </div>
</div>
</body></html>
