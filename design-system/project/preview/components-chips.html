<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0}
  .card{ width:700px; height:220px; padding:24px 28px; box-sizing:border-box; background:var(--bg); border:1px solid var(--earned-cream-dark) }
  .label{ font-family:var(--font-sans); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--fg-muted); font-weight:600; margin-bottom:18px }
  .row{ display:flex; gap:18px; align-items:center; flex-wrap:wrap }
  /* Streak chip — sticker with ink shadow */
  .chip{
    display:inline-flex; align-items:center; gap:8px;
    background:var(--earned-cream-light); border:1.5px solid var(--earned-ink);
    padding:8px 14px; border-radius:999px;
    font-family:var(--font-sans); font-weight:600; font-size:14px;
    box-shadow: var(--shadow-ink);
  }
  .chip.gold{ background:var(--earned-star-gold) }
  .chip.sky{ background:var(--earned-sky); color:var(--earned-cream-light) }
  .chip.rose{ background:var(--earned-cream-light); color:var(--earned-rose); border-color:var(--earned-rose); box-shadow: 2px 2px 0 var(--earned-rose) }
  .chip svg{ width:18px; height:18px }
  .chip .num{ font-family:var(--font-hand); font-weight:700; font-size:20px; line-height:1 }
</style></head>
<body>
<div class="card">
  <div class="label">Status chips · sticker family</div>
  <div class="row">
    <span class="chip gold">
      <svg viewBox="0 0 24 24"><path d="M12 2 L15 9 L22 10 L17 15 L18 22 L12 18 L6 22 L7 15 L2 10 L9 9 Z" fill="#1F1F1D"/></svg>
      <span class="num">12</span> day streak
    </span>
    <span class="chip sky">
      Today
    </span>
    <span class="chip">
      <span class="num">3</span> of 5 done
    </span>
    <span class="chip">
      Rest day
    </span>
    <span class="chip rose">
      Missed yesterday
    </span>
  </div>
</div>
</body></html>
